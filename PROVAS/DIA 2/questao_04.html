<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Jogador da Copa do Mundo </title>
    <link href="css/bootstrap.css" rel="stylesheet">
    <style> 
        body, html {
            height: 100%;
            margin: 0;
        }
        .bg-copa {
            background-image: url('img/FIFA-World-Cup-26.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            
        }
        .card {
            backdrop-filter: blur(5px);
            background-color: rgba(255, 255, 255, 0.9);
            border: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <div class="bg-copa">
    <div class="d-flex flex-column align-items-center"> 
        
        <div id="Cards" class="d-flex flex-row align-items-center justify-content-center gap-3">
            <div class="card" style="width: 22rem;">
                <img src="img/_vinicius_junior.png" class="card-img-top" alt="Vini Jr">
                <div class="card-body">
                    <h5 class="card-title">
                        <span>Vini JR.</span>
                        <span class="badge text-bg-secondary">9,5</span>
                    </h5>
                    <p class="card-text">
                        <span><strong>Nascimento:</strong> 12/07/2000</span><br>
                        <span><strong>Altura:</strong> 1,76</span><br>
                        <span><strong>Posição:</strong> Ponta-esquerda / Atacante</span><br>
                    </p>
                </div>
            </div>
        </div>

        <div class="d-grid gap-2 col-12 mx-auto">
            <button type="button" onclick="add()" class="btn btn-primary mt-4 p-3 shadow">
                Adicionar Novo Jogador
            </button>
        </div>
    </div>
</div>

<script src="js/bootstrap.js"></script>
<script src="script.js"></script>

</body>
</html>
